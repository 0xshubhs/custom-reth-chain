version: '3.9'

services:
  db:
    image: postgres:15
    shm_size: 256m
    restart: always
    container_name: ${DB_CONTAINER_NAME:-db}
    command: postgres -c 'max_connections=200' -c 'client_connection_check_interval=60000'
    environment:
        POSTGRES_DB: 'blockscout'
        POSTGRES_USER: 'blockscout'
        POSTGRES_PASSWORD: 'ceWb1MeLBEeOIfk65gU8EjF8'
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-7432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    depends_on:
      - db
    image: blockscout/${DOCKER_REPO:-blockscout}:${DOCKER_TAG:-7.0.0}
    pull_policy: always
    restart: always
    stop_grace_period: 5m
    container_name: ${BACKEND_CONTAINER_NAME:-backend}
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    # Host network so the backend can reach the native chain binary on
    # 127.0.0.1:8545 without hitting UFW on the docker bridge. Postgres is
    # reached over the loopback-published port (127.0.0.1:7432).
    network_mode: host
    env_file:
      -  ./common-blockscout.env
    volumes:
      - type: bind
        source: ./genesis.json
        target: /app/genesis.json

  frontend:
    depends_on:
      - backend
    image: ghcr.io/blockscout/frontend:${FRONTEND_DOCKER_TAG:-v1.37.4}
    pull_policy: always
    platform: linux/amd64
    restart: always
    container_name: ${FRONTEND_CONTAINER_NAME:-frontend}
    # Host network so nginx upstream `127.0.0.1:3001` reaches the app
    # directly and there's no docker bridge between frontend → backend.
    network_mode: host
    env_file:
      -  ./common-frontend.env
